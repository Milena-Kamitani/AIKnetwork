<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AIK Controle{% endblock %}</title>
  <link rel="icon" href="/static/img/logo-aik.png" type="image/png">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <img src="/static/img/logo-aik.png" alt="AIK Network" class="brand-logo">
        <span class="brand-text">Controle de Chamados</span>
      </a>
      <nav>
        {% block nav %}
        <a href="/">Abrir chamado</a>
        <a href="/tecnicos/login">Área dos técnicos</a>
        {% endblock %}
      </nav>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="container footer-inner">
      <img src="/static/img/logo-aik.png" alt="" class="footer-logo" aria-hidden="true">
      <span>AIK Network — suporte interno</span>
    </div>
  </footer>

  <div id="image-lightbox" class="lightbox" hidden aria-hidden="true">
    <div class="lightbox-backdrop" data-lightbox-close></div>
    <div class="lightbox-dialog" role="dialog" aria-modal="true" aria-label="Visualizar imagem">
      <button type="button" class="lightbox-close" data-lightbox-close aria-label="Fechar">&times;</button>
      <img class="lightbox-image" src="" alt="">
      <p class="lightbox-caption"></p>
    </div>
  </div>
  <script src="/static/js/lightbox.js"></script>
</body>
</html>
